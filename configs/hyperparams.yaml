# configs/hyperparams.yaml
# All RL/GNN hyperparameters for reproducibility

ppo:
  clip_ratio: 0.2
  gae_lambda: 0.95
  entropy_coeff: 0.01
  learning_rate: 3.0e-4
  lr_schedule: cosine
  batch_size: 64
  ppo_epochs: 4
  collect_steps: 2048
  max_episode_steps: 50
  gamma: 0.99
  total_env_steps: 500000
  val_interval_steps: 50000

gnn:
  num_layers: 3
  hidden_dim: 128
  embedding_dim: 64
  aggregation: mean
  pooling: mean
  dropout: 0.1

policy_mlp:
  hidden_dim: 256
  num_layers: 2
  activation: relu

value_mlp:
  hidden_dim: 256
  num_layers: 2
  activation: relu

seeds: [42, 123, 456]